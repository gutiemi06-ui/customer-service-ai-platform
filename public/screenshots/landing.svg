<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#ffffff"/>
  <!-- Grid dots background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#3b82f620"/>
    </pattern>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.04"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#grid)"/>
  <rect width="1440" height="500" fill="url(#heroGrad)"/>

  <!-- Nav -->
  <rect width="1440" height="64" fill="#ffffff" opacity="0.95"/>
  <rect y="63" width="1440" height="1" fill="#f3f4f6"/>
  <!-- Logo -->
  <rect x="40" y="18" width="28" height="28" rx="7" fill="#2563eb"/>
  <text x="78" y="37" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#111827">SupportAI</text>
  <!-- Nav links -->
  <text x="500" y="37" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280">Features</text>
  <text x="590" y="37" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280">How it works</text>
  <text x="700" y="37" font-family="system-ui,sans-serif" font-size="14" fill="#6b7280">Results</text>
  <!-- CTA buttons -->
  <text x="1280" y="37" font-family="system-ui,sans-serif" font-size="14" fill="#374151">Sign in</text>
  <rect x="1330" y="18" width="90" height="32" rx="8" fill="#2563eb"/>
  <text x="1348" y="38" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Get started</text>

  <!-- Badge -->
  <rect x="620" y="110" width="200" height="32" rx="16" fill="#eff6ff"/>
  <circle cx="638" cy="126" r="5" fill="#3b82f6"/>
  <text x="650" y="131" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#1d4ed8">AI-powered support, live</text>

  <!-- Hero heading -->
  <text x="720" y="210" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="#111827" text-anchor="middle">Customer support that</text>
  <text x="720" y="275" font-family="system-ui,sans-serif" font-size="52" font-weight="800" text-anchor="middle">
    <tspan fill="#2563eb">resolves </tspan><tspan fill="#7c3aed">itself</tspan>
  </text>
  <text x="720" y="335" font-family="system-ui,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">SupportAI combines Claude AI with intelligent ticket routing to handle</text>
  <text x="720" y="360" font-family="system-ui,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">60% of support queries automatically — so your team can focus on what matters.</text>

  <!-- CTA buttons -->
  <rect x="510" y="395" width="190" height="52" rx="12" fill="#2563eb"/>
  <text x="605" y="426" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Start free trial →</text>
  <rect x="720" y="395" width="175" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="808" y="426" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#374151" text-anchor="middle">▶ View demo</text>

  <!-- Demo credentials -->
  <text x="720" y="470" font-family="system-ui,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Demo: admin@support.dev / admin123</text>

  <!-- Mini dashboard preview -->
  <rect x="280" y="500" width="880" height="380" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Browser bar -->
  <rect x="280" y="500" width="880" height="44" rx="16" fill="#f9fafb"/>
  <rect x="280" y="528" width="880" height="16" fill="#f9fafb"/>
  <circle cx="304" cy="522" r="6" fill="#f87171"/>
  <circle cx="320" cy="522" r="6" fill="#fbbf24"/>
  <circle cx="336" cy="522" r="6" fill="#34d399"/>
  <rect x="360" y="514" width="300" height="16" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="510" y="526" font-family="monospace,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">app.supportai.dev/dashboard</text>
  <!-- Stat cards -->
  <rect x="300" y="558" width="190" height="80" rx="12" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="308" y="566" width="28" height="28" rx="7" fill="#eff6ff"/>
  <text x="308" y="622" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#111827">1,284</text>
  <text x="308" y="638" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Total Tickets</text>
  <rect x="506" y="558" width="190" height="80" rx="12" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="514" y="566" width="28" height="28" rx="7" fill="#fefce8"/>
  <text x="514" y="622" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#111827">47</text>
  <text x="514" y="638" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Open</text>
  <rect x="712" y="558" width="190" height="80" rx="12" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="720" y="566" width="28" height="28" rx="7" fill="#f0fdf4"/>
  <text x="720" y="622" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#111827">87%</text>
  <text x="720" y="638" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Resolution Rate</text>
  <rect x="918" y="558" width="222" height="80" rx="12" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="926" y="566" width="28" height="28" rx="7" fill="#faf5ff"/>
  <text x="926" y="622" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#111827">4.3/5</text>
  <text x="926" y="638" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">CSAT</text>
  <!-- Ticket rows -->
  <rect x="300" y="654" width="840" height="200" rx="12" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="300" y="654" width="840" height="1" fill="#f3f4f6"/>
  <text x="316" y="678" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111827">API rate limit exceeded in production</text>
  <rect x="1060" y="666" width="60" height="20" rx="10" fill="#fee2e2"/>
  <text x="1090" y="680" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#dc2626" text-anchor="middle">Urgent</text>
  <rect x="300" y="694" width="840" height="1" fill="#f9fafb"/>
  <text x="316" y="718" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111827">Cannot access account after 2FA reset</text>
  <rect x="1060" y="706" width="60" height="20" rx="10" fill="#fff7ed"/>
  <text x="1090" y="720" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#ea580c" text-anchor="middle">High</text>
  <rect x="300" y="734" width="840" height="1" fill="#f9fafb"/>
  <text x="316" y="758" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111827">Invoice shows incorrect discount amount</text>
  <rect x="1060" y="746" width="60" height="20" rx="10" fill="#eff6ff"/>
  <text x="1090" y="760" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#2563eb" text-anchor="middle">Medium</text>
  <!-- Fade out -->
  <defs>
    <linearGradient id="fadeOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="280" y="750" width="880" height="130" fill="url(#fadeOut)"/>
</svg>
