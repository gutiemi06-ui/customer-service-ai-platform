  <text x="1062" y="204" font-family="system-ui,sans-serif" font-size="12" fill="#9ca3af">Submitted by</text>
  <text x="1062" y="222" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#111827">Grace Kim</text>
  <text x="1062" y="248" font-family="system-ui,sans-serif" font-size="12" fill="#9ca3af">Assigned to</text>
  <text x="1062" y="266" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#111827">Sarah Chen</text>
  <text x="1062" y="292" font-family="system-ui,sans-serif" font-size="12" fill="#9ca3af">Created</text>
  <text x="1062" y="310" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#111827">April 4, 2026 at 2:14 PM</text>
  <text x="1062" y="336" font-family="system-ui,sans-serif" font-size="12" fill="#9ca3af">Status</text>
  <rect x="1062" y="344" width="100" height="24" rx="12" fill="#fef3c7"/>
  <text x="1112" y="360" font-family="system-ui,sans-serif" font-size="12" fill="#d97706" text-anchor="middle">In Progress</text>

  <!-- KB Suggestions panel -->
  <rect x="1040" y="376" width="376" height="220" rx="14" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <text x="1062" y="408" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#111827">📚 KB Suggestions</text>
  <rect x="1040" y="416" width="376" height="1" fill="#f3f4f6"/>
  <!-- KB article 1 -->
  <rect x="1062" y="430" width="332" height="50" rx="8" fill="#f9fafb"/>
  <rect x="1074" y="438" width="8" height="8" rx="2" fill="#2563eb"/>
  <text x="1090" y="448" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#111827">API rate limits and how to handle them</text>
  <text x="1090" y="464" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">High relevance · 23,410 views</text>
  <!-- KB article 2 -->
  <rect x="1062" y="488" width="332" height="50" rx="8" fill="#f9fafb"/>
  <rect x="1074" y="496" width="8" height="8" rx="2" fill="#2563eb"/>
  <text x="1090" y="506" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#111827">Troubleshooting connection errors</text>
  <text x="1090" y="522" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">Medium relevance · 16,540 views</text>
  <!-- KB article 3 -->
  <rect x="1062" y="546" width="332" height="50" rx="8" fill="#f9fafb"/>
  <rect x="1074" y="554" width="8" height="8" rx="2" fill="#3b82f6" opacity="0.5"/>
  <text x="1090" y="564" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#111827">Setting up webhook integrations</text>
  <text x="1090" y="580" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">Low relevance · 9,870 views</text>

  <!-- Sentiment panel -->
  <rect x="1040" y="612" width="376" height="130" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
