  <text x="1062" y="666" font-family="system-ui,sans-serif" font-size="13" fill="#166534">Sentiment: Neutral (score: 0.61)</text>
  <text x="1062" y="686" font-family="system-ui,sans-serif" font-size="13" fill="#166534">Escalation: Not required</text>
  <text x="1062" y="706" font-family="system-ui,sans-serif" font-size="13" fill="#166534">Emotions: concerned, professional</text>
  <!-- Score bar -->
  <rect x="1062" y="718" width="332" height="8" rx="4" fill="#dcfce7"/>
  <rect x="1062" y="718" width="202" height="8" rx="4" fill="#22c55e"/>
